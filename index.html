<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Downloads</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
    padding: 40px;
}

h1 {
    font-size: 40px;
}

.file {
    margin: 20px auto;
    padding: 15px;
    background: #1a1a1a;
    border-radius: 10px;
    width: 300px;
}

a {
    color: #4CAF50;
    text-decoration: none;
    font-size: 18px;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Downloads</h1>

<!-- Cirno EXE -->
<div class="file">
    <p><b>Cirno</b> (downloader.exe)</p>
    <a href="downloader.exe" download>Download</a><br>
    <button onclick="copyCmd('downloader.exe')">Copy PowerShell Command</button>
</div>

<!-- test.txt -->
<div class="file">
    <p>test.txt</p>
    <a href="test.txt" download>Download</a><br>
    <button onclick="copyCmd('test.txt')">Copy PowerShell Command</button>
</div>

<script>
function copyCmd(file) {
    const base = window.location.origin + window.location.pathname;
    const url = base.endsWith('/') ? base + file : base + '/' + file;
    const cmd = `iwr "${url}" -OutFile "$env:USERPROFILE\\Downloads\\${file}"`;

    navigator.clipboard.writeText(cmd);
    alert("Copied!");
}
</script>

</body>
</html>
